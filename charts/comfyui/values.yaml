# Container image for ComfyUI.
# https://hub.docker.com/r/yanwk/comfyui-boot/tags
image:
  repository: yanwk/comfyui-boot
  tag: cpu
  pullPolicy: IfNotPresent

# Number of replicas.
replicas: 1

# Additional CLI arguments passed to ComfyUI via CLI_ARGS.
# The entrypoint already passes --listen and --port 8188.
cliArgs: "--cpu"

# Install comfyui-vllm-omni custom nodes on first boot.
customNodes:
  vllmOmni:
    enabled: true
    # Official vLLM-Omni custom nodes
    repository: https://github.com/vllm-project/vllm-omni.git
    path: apps/ComfyUI-vLLM-Omni
    # Model discovery patch from this project
    patchRepository: https://github.com/NickCao/comfyui-vllm-omni-on-openshift.git
    patchPath: comfyui-vllm-omni/comfyui_vllm_omni

# Persistent volume for ComfyUI user data (models, outputs, custom nodes).
persistence:
  enabled: true
  storageClassName: ""
  size: 10Gi
  accessMode: ReadWriteOnce

# OpenShift Route for external access.
route:
  enabled: true
  host: ""
  tls:
    termination: edge

# Resource requests and limits.
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

# Basic auth via nginx sidecar.
auth:
  enabled: true
  # Username for basic auth.
  username: comfyui
  # Password for basic auth. Generate a random one if deploying manually.
  # The portal generates this automatically.
  password: ""

# Additional environment variables.
# VLLM_API_BASE_URL points ComfyUI at the semantic router for model
# discovery and API requests.
extraEnv:
  - name: VLLM_API_BASE_URL
    value: "http://litellm:4000/v1"
