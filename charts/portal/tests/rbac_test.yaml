suite: RBAC - ServiceAccount
templates:
  - templates/serviceaccount.yaml

tests:
  - it: should render a ServiceAccount
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should use the correct name
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-portal

---
suite: RBAC - Role
templates:
  - templates/role.yaml

tests:
  - it: should render a Role
    asserts:
      - isKind:
          of: Role

  - it: should grant pods and pods/log access
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods", "pods/log"]
            verbs: ["get", "list"]

  - it: should grant route access
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["route.openshift.io"]
            resources: ["routes"]
            verbs: ["create", "get", "list", "update", "delete"]

  - it: should grant explicit verbs on secrets for Helm
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["create", "get", "list", "update", "delete"]

---
suite: RBAC - RoleBinding
templates:
  - templates/rolebinding.yaml

tests:
  - it: should render a RoleBinding
    asserts:
      - isKind:
          of: RoleBinding

  - it: should bind role to service account
    release:
      name: my-release
      namespace: test-ns
    asserts:
      - equal:
          path: roleRef.name
          value: my-release-portal
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: my-release-portal
            namespace: test-ns
