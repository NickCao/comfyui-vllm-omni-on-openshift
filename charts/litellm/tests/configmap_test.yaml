suite: ConfigMap
templates:
  - templates/configmap.yaml

tests:
  - it: should render a ConfigMap
    asserts:
      - isKind:
          of: ConfigMap
      - isAPIVersion:
          of: v1

  - it: should use the release name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME

  - it: should contain empty model_list by default
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "model_list: \\[\\]"

  - it: should inline model configuration when set
    set:
      config:
        model_list:
          - model_name: gpt-4
            litellm_params:
              model: openai/gpt-4
              api_base: http://localhost:8080/v1
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "model_name: gpt-4"
