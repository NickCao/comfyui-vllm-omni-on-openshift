suite: Deployment
templates:
  - templates/deployment.yaml

tests:
  - it: should render a Deployment
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1

  - it: should use the correct name
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-comfyui

  - it: should use the default image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "yanwk/comfyui-boot:cpu"

  - it: should expose port 8188
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8188

  - it: should set CLI_ARGS
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CLI_ARGS
            value: "--cpu"

  - it: should not set VLLM_OMNI_URL by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VLLM_OMNI_URL
          any: true

  - it: should set VLLM_OMNI_URL when configured
    set:
      vllmOmniUrl: http://vllm-omni:8080
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VLLM_OMNI_URL
            value: "http://vllm-omni:8080"

  - it: should mount emptyDir at /root for writable home
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: home
            mountPath: /root
      - contains:
          path: spec.template.spec.volumes
          content:
            name: home
            emptyDir: {}

  - it: should mount PVC subpaths for persistent directories
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /root/ComfyUI/custom_nodes
            subPath: custom_nodes
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /root/ComfyUI/output
            subPath: output
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /root/ComfyUI/input
            subPath: input
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /root/ComfyUI/user
            subPath: user

  - it: should use init container to copy pre-start script when custom nodes enabled
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: setup-scripts
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: home
            mountPath: /root
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: pre-start
            mountPath: /scripts

  - it: should not have init container when custom nodes disabled
    set:
      customNodes.vllmOmni.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: should not mount PVC when persistence is disabled
    set:
      persistence.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
          any: true

  - it: should set replica count
    set:
      replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should configure startup probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 30

  - it: should include selector labels
    release:
      name: my-release
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: comfyui
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: my-release
