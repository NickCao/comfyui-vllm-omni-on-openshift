suite: PersistentVolumeClaim
templates:
  - templates/pvc.yaml

tests:
  - it: should render a PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim

  - it: should not render when disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use default size
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi

  - it: should use custom size
    set:
      persistence.size: 50Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi

  - it: should set storage class when specified
    set:
      persistence.storageClassName: gp3-csi
    asserts:
      - equal:
          path: spec.storageClassName
          value: gp3-csi
