image: docker.litellm.ai/berriai/litellm:main-stable

# Master key for API auth and admin UI login.
masterKey: "sk-1234"

# Admin UI credentials (accessible at /ui).
ui:
  username: admin
  password: admin

# LiteLLM proxy config inlined into a ConfigMap.
# See: https://docs.litellm.ai/docs/proxy/configs
config:
  model_list: []

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
