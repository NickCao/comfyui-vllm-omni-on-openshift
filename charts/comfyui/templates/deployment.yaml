apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "comfyui.fullname" . }}
  labels:
    {{- include "comfyui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "comfyui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "comfyui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "comfyui.fullname" . }}
      {{- if .Values.customNodes.vllmOmni.enabled }}
      initContainers:
        - name: setup-scripts
          image: busybox
          command: ['sh', '-c', 'mkdir -p /root/user-scripts && cp /scripts/pre-start.sh /root/user-scripts/pre-start.sh']
          volumeMounts:
            - name: data
              mountPath: /root
            - name: pre-start
              mountPath: /scripts
      {{- end }}
      containers:
        - name: comfyui
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8188
              protocol: TCP
          env:
            - name: CLI_ARGS
              value: {{ .Values.cliArgs | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /root
          {{- end }}
        {{- if .Values.auth.enabled }}
        - name: nginx
          image: nginxinc/nginx-unprivileged:alpine
          ports:
            - name: auth
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: auth-htpasswd
              mountPath: /etc/nginx/auth
          readinessProbe:
            httpGet:
              path: /healthz
              port: auth
            periodSeconds: 10
        {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "comfyui.fullname" . }}-data
        {{- end }}
        {{- if .Values.customNodes.vllmOmni.enabled }}
        - name: pre-start
          configMap:
            name: {{ include "comfyui.fullname" . }}-scripts
            defaultMode: 0755
        {{- end }}
        {{- if .Values.auth.enabled }}
        - name: nginx-config
          configMap:
            name: {{ include "comfyui.fullname" . }}-nginx
        - name: auth-htpasswd
          secret:
            secretName: {{ include "comfyui.fullname" . }}-auth
            items:
              - key: htpasswd
                path: htpasswd
        {{- end }}
