suite: Service
templates:
  - templates/service.yaml

tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - isAPIVersion:
          of: v1

  - it: should use ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should target auth port when auth is enabled
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8188
            targetPort: auth
            protocol: TCP

  - it: should target http port when auth is disabled
    set:
      auth.enabled: false
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8188
            targetPort: http
            protocol: TCP
