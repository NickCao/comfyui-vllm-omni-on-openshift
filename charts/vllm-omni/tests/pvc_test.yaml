suite: PersistentVolumeClaim
templates:
  - templates/pvc.yaml

tests:
  - it: should render a PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - isAPIVersion:
          of: v1

  - it: should use the correct name
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-vllm-omni-model-cache

  - it: should use default size and access mode
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi
      - contains:
          path: spec.accessModes
          content: ReadWriteOnce

  - it: should use custom size
    set:
      modelCache.size: 100Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 100Gi

  - it: should use custom access mode
    set:
      modelCache.accessMode: ReadWriteMany
    asserts:
      - contains:
          path: spec.accessModes
          content: ReadWriteMany

  - it: should set storage class when specified
    set:
      modelCache.storageClassName: gp3-csi
    asserts:
      - equal:
          path: spec.storageClassName
          value: gp3-csi

  - it: should not set storage class when empty
    set:
      modelCache.storageClassName: ""
    asserts:
      - notExists:
          path: spec.storageClassName

  - it: should not render when disabled
    set:
      modelCache.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should include common labels
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: vllm-omni
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-release
