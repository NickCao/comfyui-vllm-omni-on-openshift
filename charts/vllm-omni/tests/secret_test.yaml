suite: Secret
templates:
  - templates/secret.yaml

tests:
  - it: should not render when no token is provided
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a Secret when token is provided
    set:
      huggingface.token: hf_abc123
    asserts:
      - isKind:
          of: Secret
      - isAPIVersion:
          of: v1

  - it: should use the correct name
    release:
      name: my-release
    set:
      huggingface.token: hf_abc123
    asserts:
      - equal:
          path: metadata.name
          value: my-release-vllm-omni-hf-token

  - it: should store the token in stringData
    set:
      huggingface.token: hf_abc123
    asserts:
      - equal:
          path: stringData.token
          value: hf_abc123
      - equal:
          path: type
          value: Opaque

  - it: should not render when existingSecret is set
    set:
      huggingface.token: hf_abc123
      huggingface.existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should include common labels
    release:
      name: my-release
    set:
      huggingface.token: hf_abc123
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: vllm-omni
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-release
