apiVersion: v1
kind: Service
metadata:
  name: {{ include "sr-dashboard.fullname" . }}
  labels:
    {{- include "sr-dashboard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8700
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sr-dashboard.selectorLabels" . | nindent 4 }}
