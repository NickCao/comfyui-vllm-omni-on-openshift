{{- if .Values.customNodes.vllmOmni.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "comfyui.fullname" . }}-scripts
  labels:
    {{- include "comfyui.labels" . | nindent 4 }}
data:
  pre-start.sh: |
    #!/bin/bash
    set -e
    CUSTOM_NODES_DIR="/root/ComfyUI/custom_nodes/ComfyUI-vLLM-Omni"

    echo "Installing official vLLM-Omni custom nodes..."
    rm -rf "$CUSTOM_NODES_DIR"
    TMPDIR=$(mktemp -d)
    git clone --depth 1 --filter=blob:none --sparse {{ .Values.customNodes.vllmOmni.repository | quote }} "$TMPDIR"
    git -C "$TMPDIR" sparse-checkout set {{ .Values.customNodes.vllmOmni.path | quote }}
    mv "$TMPDIR"/{{ .Values.customNodes.vllmOmni.path | quote }} "$CUSTOM_NODES_DIR"
    rm -rf "$TMPDIR"

    echo "Applying model discovery patch..."
    TMPDIR=$(mktemp -d)
    git clone --depth 1 --filter=blob:none --sparse {{ .Values.customNodes.vllmOmni.patchRepository | quote }} "$TMPDIR"
    git -C "$TMPDIR" sparse-checkout set {{ .Values.customNodes.vllmOmni.patchPath | quote }}
    cp -r "$TMPDIR"/{{ .Values.customNodes.vllmOmni.patchPath | quote }}/* "$CUSTOM_NODES_DIR/comfyui_vllm_omni/"
    rm -rf "$TMPDIR"

    echo "vLLM-Omni custom nodes installed successfully."
{{- end }}
