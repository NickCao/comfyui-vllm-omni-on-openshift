suite: Auth Secret
templates:
  - templates/auth-secret.yaml

tests:
  - it: should render a Secret when auth is enabled
    asserts:
      - isKind:
          of: Secret
      - isAPIVersion:
          of: v1

  - it: should not render when auth is disabled
    set:
      auth.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use the correct name
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-comfyui-auth

  - it: should be of type Opaque
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain htpasswd and password data keys
    set:
      auth.username: testuser
      auth.password: testpass
    asserts:
      - isNotEmpty:
          path: data.htpasswd
      - isNotEmpty:
          path: data.password

  - it: should include common labels
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: comfyui
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-release
