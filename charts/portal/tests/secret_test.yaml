suite: Secret
templates:
  - templates/secret.yaml

tests:
  - it: should render a Secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  - it: should store GitHub credentials and session secret
    set:
      github.clientID: test-client-id
      github.clientSecret: test-client-secret
      sessionSecret: test-session-secret
    asserts:
      - equal:
          path: stringData.GITHUB_CLIENT_ID
          value: test-client-id
      - equal:
          path: stringData.GITHUB_CLIENT_SECRET
          value: test-client-secret
      - equal:
          path: stringData.SESSION_SECRET
          value: test-session-secret
