{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "sr-dashboard.fullname" . }}
  labels:
    {{- include "sr-dashboard.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ include "sr-dashboard.fullname" . }}
    weight: 100
  port:
    targetPort: http
  tls:
    termination: {{ .Values.route.tls.termination }}
{{- end }}
