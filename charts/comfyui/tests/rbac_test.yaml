suite: RBAC - ServiceAccount
templates:
  - templates/serviceaccount.yaml

tests:
  - it: should render a ServiceAccount
    asserts:
      - isKind:
          of: ServiceAccount
      - isAPIVersion:
          of: v1

  - it: should use the correct name
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-comfyui

  - it: should include common labels
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: comfyui
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-release

---
suite: RBAC - Role
templates:
  - templates/role.yaml

tests:
  - it: should render a Role
    asserts:
      - isKind:
          of: Role
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1

  - it: should use the correct name
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-comfyui

  - it: should grant list access to KServe InferenceServices
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["serving.kserve.io"]
            resources: ["inferenceservices"]
            verbs: ["list"]

  - it: should include common labels
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: comfyui
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-release

---
suite: RBAC - RoleBinding
templates:
  - templates/rolebinding.yaml

tests:
  - it: should render a RoleBinding
    asserts:
      - isKind:
          of: RoleBinding
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1

  - it: should use the correct name
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-comfyui

  - it: should reference the correct Role
    release:
      name: my-release
    asserts:
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: roleRef.name
          value: my-release-comfyui

  - it: should bind to the correct ServiceAccount in the release namespace
    release:
      name: my-release
      namespace: test-ns
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: my-release-comfyui
            namespace: test-ns

  - it: should include common labels
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: comfyui
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-release
